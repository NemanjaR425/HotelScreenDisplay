name: Deploy Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: |
          # This command finds the 'client' folder automatically
          CLIENT_PATH=$(find . -name "package.json" -path "*/client/*" -exec dirname {} \;)
          echo "Found client at: $CLIENT_PATH"
          cd "$CLIENT_PATH"
          npm install
          npx vite build --base ./ --outDir ../dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './HotelScreenDisplay/dist' # Adjusted for your specific nesting

      - name: Deploy
        uses: actions/deploy-pages@v4
